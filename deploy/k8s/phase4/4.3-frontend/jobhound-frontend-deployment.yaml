---
# Phase 4.3 — JobHound Next.js frontend Deployment
#
# Same pattern as SpendHound frontend. 2 replicas, prefer worker nodes.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobhound-frontend
  namespace: jobhound
  labels:
    app: jobhound-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobhound-frontend
  template:
    metadata:
      labels:
        app: jobhound-frontend
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node-role
                    operator: In
                    values:
                      - worker
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: jobhound-frontend
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001

      containers:
        - name: frontend
          image: 192.168.1.37:5000/jobhound-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          env:
            - name: INTERNAL_API_URL
              value: "http://jobhound-backend.jobhound.svc.cluster.local:8000"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"

          envFrom:
            - secretRef:
                name: jobhound-frontend-secrets

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 4
