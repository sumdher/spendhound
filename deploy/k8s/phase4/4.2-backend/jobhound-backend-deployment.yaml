---
# Phase 4.2 — JobHound FastAPI backend Deployment
#
# Same architecture as SpendHound backend (phase 2.1).
# Single replica — same reason (in-process rate limiting, no Redis yet).
# Points to shared Postgres (jobhound database) and shared Ollama.
#
# JobHound does NOT use receipt uploads, so no receipts PVC is needed.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobhound-backend
  namespace: jobhound
  labels:
    app: jobhound-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobhound-backend
  template:
    metadata:
      labels:
        app: jobhound-backend
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: storage
                    operator: In
                    values:
                      - primary

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001

      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.shared.svc.cluster.local 5432; do
                echo "waiting for postgres..."; sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: backend
          image: 192.168.1.37:5000/jobhound-backend:latest
          imagePullPolicy: Always

          command:
            - sh
            - -c
            - |
              alembic upgrade head &&
              exec uvicorn app.main:app \
                --host 0.0.0.0 \
                --port 8000 \
                --workers 1 \
                --access-log \
                --timeout-keep-alive 30

          ports:
            - containerPort: 8000
              name: http

          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.shared.svc.cluster.local:5432/jobhound"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secrets
                  key: POSTGRES_PASSWORD
            - name: OLLAMA_URL
              value: "http://ollama.shared.svc.cluster.local:11434"
            - name: LLM_PROVIDER
              value: "ollama"

          envFrom:
            - secretRef:
                name: jobhound-backend-secrets

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
