---
# Phase 4.4 — JobHound Services and Ingress

# Backend ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: jobhound-backend
  namespace: jobhound
  labels:
    app: jobhound-backend
spec:
  type: ClusterIP
  selector:
    app: jobhound-backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http

---
# Frontend ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: jobhound-frontend
  namespace: jobhound
  labels:
    app: jobhound-frontend
spec:
  type: ClusterIP
  selector:
    app: jobhound-frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http

---
# Traefik IngressRoute for jobhound.dodecahedrons.com
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jobhound
  namespace: jobhound
spec:
  entryPoints:
    - web

  routes:
    - match: Host(`jobhound.dodecahedrons.com`)
      kind: Rule
      services:
        - name: jobhound-frontend
          port: 3000
