---
# Phase 4.5 — JobHound cloudflared Deployment
#
# Identical structure to SpendHound cloudflared (phase 2.5).
# Uses CLOUDFLARE_TUNNEL_TOKEN_JOBHOUND key from shared-infra-secrets.
# Image pinned by same SHA256 digest as docker-compose.prod.yml.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobhound-cloudflared
  namespace: jobhound
  labels:
    app: jobhound-cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobhound-cloudflared
  template:
    metadata:
      labels:
        app: jobhound-cloudflared
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: jobhound-cloudflared
                topologyKey: kubernetes.io/hostname

      containers:
        - name: cloudflared
          image: cloudflare/cloudflared@sha256:2c78df02e1f23ab19d4c636921f05b9ebec163b887e946f98e22e56254a5540f
          imagePullPolicy: IfNotPresent

          command:
            - cloudflared
            - tunnel
            - --no-autoupdate
            - --config
            - /etc/cloudflared/config.yml
            - run
            - --token
            - $(TUNNEL_TOKEN)

          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: shared-infra-secrets
                  key: CLOUDFLARE_TUNNEL_TOKEN_JOBHOUND

          resources:
            requests:
              memory: 32Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: config
          configMap:
            name: jobhound-cloudflared-config
        - name: tmp
          emptyDir: {}
