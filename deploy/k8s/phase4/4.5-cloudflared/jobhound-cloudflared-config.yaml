---
# Phase 4.5 — JobHound cloudflared: tunnel ingress config

apiVersion: v1
kind: ConfigMap
metadata:
  name: jobhound-cloudflared-config
  namespace: jobhound
data:
  config.yml: |
    # JobHound Cloudflare Tunnel — K8s configuration

    ingress:
      - hostname: jobhound.dodecahedrons.com
        service: http://traefik.kube-system.svc.cluster.local:80

      - service: http_status:404
