---
# Phase 5.1 — ResourceQuota and LimitRange for the spendhound namespace
#
# Caps total resource consumption to prevent runaway pods starving shared infra.
# Limits are intentionally generous for a homelab — tighten once you have
# Prometheus metrics showing actual usage.

apiVersion: v1
kind: ResourceQuota
metadata:
  name: spendhound-quota
  namespace: spendhound
spec:
  hard:
    # backend 1 core + 2× frontend 0.5 core; ceiling at 4
    requests.cpu: "1"
    limits.cpu: "4"
    # backend 2 GB + 2× frontend 1 GB; ceiling at 6 GB
    requests.memory: 1Gi
    limits.memory: 6Gi
    pods: "20"
    # receipts PVC counts here
    persistentvolumeclaims: "5"

---
# LimitRange: default requests/limits for pods that don't specify them.
apiVersion: v1
kind: LimitRange
metadata:
  name: spendhound-defaults
  namespace: spendhound
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
