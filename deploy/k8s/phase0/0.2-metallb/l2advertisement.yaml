---
# Phase 0.2 — MetalLB L2 advertisement
# Announces homelab-pool IPs via ARP on the LAN (192.168.1.0/24).
# No BGP router required — works out of the box on a flat home LAN.
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: homelab-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - homelab-pool
