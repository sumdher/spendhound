---
# Phase 0.4 — Infisical machine-identity credentials for ESO
#
# DO NOT commit the real values. This file is an example/template.
# Create the real secret imperatively (never stored in git):
#
#   kubectl create secret generic infisical-credentials \
#     --namespace external-secrets \
#     --from-literal=clientId=<your-machine-identity-client-id> \
#     --from-literal=clientSecret=<your-machine-identity-client-secret>
#
# How to get these values:
#   1. Log in to app.infisical.com → your Org → Access Control → Machine Identities
#   2. Create a Machine Identity (or use an existing one) with "Read" permission
#      on the spendhound project, environment: prod
#   3. Copy the Client ID and Client Secret shown at creation time
#      (the secret is shown only once — store it in a password manager)
#
# The ESO ClusterSecretStore (clustersecretstore.yaml) references this K8s secret.

apiVersion: v1
kind: Secret
metadata:
  name: infisical-credentials
  namespace: external-secrets
type: Opaque
stringData:
  clientId: "<REPLACE_WITH_MACHINE_IDENTITY_CLIENT_ID>"
  clientSecret: "<REPLACE_WITH_MACHINE_IDENTITY_CLIENT_SECRET>"
