---
# Phase 0.4 — ClusterSecretStore: Infisical backend
#
# This is a cluster-scoped store, meaning ExternalSecret objects in ANY namespace
# can reference it. Both spendhound and shared pull secrets from this store.
#
# Fields to fill in before applying:
#   hostAPI      — "https://app.infisical.com" for Infisical Cloud; set to your
#                  self-hosted URL if you run Infisical locally (e.g. https://infisical.homelab)
#   projectSlug  — the URL slug of your Infisical project (visible in the browser URL:
#                  app.infisical.com/project/<slug>/secrets/...)
#
# The machine-identity secret (infisical-credentials) must already exist in the
# external-secrets namespace before this is applied.
#
# Verify after apply:
#   kubectl get clustersecretstore infisical-store
#   kubectl describe clustersecretstore infisical-store   # Status.Conditions should show Ready

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: infisical-store
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            secretRef:
              name: infisical-credentials
              namespace: external-secrets
              key: clientId
          clientSecret:
            secretRef:
              name: infisical-credentials
              namespace: external-secrets
              key: clientSecret
      # FILL IN: Infisical API host
      hostAPI: "https://app.infisical.com"
      # FILL IN: your project slug (not the UUID, the URL slug)
      secretsScope:
        projectSlug: "<REPLACE_WITH_INFISICAL_PROJECT_SLUG>"
        environmentSlug: "prod"
        secretsPath: "/"
