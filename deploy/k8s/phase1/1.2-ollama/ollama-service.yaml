---
# Phase 1.2 — Ollama ClusterIP Service
#
# Accessible cluster-wide at: ollama.shared.svc.cluster.local:11434
# NOT exposed externally — ClusterIP only, by design.
#
# Apps reference this as:
#   OLLAMA_URL: http://ollama.shared.svc.cluster.local:11434

apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: shared
  labels:
    app: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: ollama
