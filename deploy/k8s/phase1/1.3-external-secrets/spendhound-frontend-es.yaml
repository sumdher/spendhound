---
# Phase 1.3 — ExternalSecret: spendhound frontend secrets
#
# Pulls from Infisical path "/frontend" into K8s Secret "spendhound-frontend-secrets"
# in the `spendhound` namespace.
#
# Secrets expected at Infisical "/frontend" (9 keys):
#   NEXTAUTH_SECRET
#   NEXTAUTH_URL
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   MONTHLY_REPORTS_FRONTEND_TOKEN
#   MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER
#   MONTHLY_REPORTS_BACKEND_JWT_SECRET
#   MONTHLY_REPORTS_BACKEND_JWT_ALGORITHM
#   PUPPETEER_EXECUTABLE_PATH

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spendhound-frontend
  namespace: spendhound
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: spendhound-frontend-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /frontend
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
