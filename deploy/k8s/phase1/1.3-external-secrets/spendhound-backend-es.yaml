---
# Phase 1.3 — ExternalSecret: spendhound backend secrets
#
# Pulls from Infisical path "/backend" into K8s Secret "spendhound-backend-secrets"
# in the `spendhound` namespace.
#
# Secrets expected at Infisical "/backend" (11 keys):
#   JWT_SECRET
#   LLM_KEY_ENCRYPTION_SECRET
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY
#   DEEPSEEK_API_KEY
#   NEBIUS_API_KEY
#   RESEND_API_KEY
#   MONTHLY_REPORTS_FRONTEND_TOKEN
#   MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spendhound-backend
  namespace: spendhound
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore
  target:
    name: spendhound-backend-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /backend
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
