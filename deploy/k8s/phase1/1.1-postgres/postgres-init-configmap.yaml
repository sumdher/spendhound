---
# Phase 1.1 — PostgreSQL init script
#
# Runs once when the data directory is empty (fresh volume or after pg_restore).
# Creates the spendhound database and enables the pgvector extension.
# POSTGRES_USER (from the secret) is already the superuser — no extra grant needed.

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: shared
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "${POSTGRES_USER}" --dbname postgres <<-EOSQL
      SELECT 'CREATE DATABASE spendhound'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'spendhound')\gexec

      \c spendhound
      CREATE EXTENSION IF NOT EXISTS vector;
    EOSQL
    echo "Database spendhound is ready."
