---
# Phase 1.1 — PostgreSQL init script
#
# Runs once when the data directory is empty (fresh volume or after pg_restore).
# Creates the spendhound and jobhound databases so both apps share one PG instance.
# POSTGRES_USER (from the secret) is already the superuser — no extra grant needed.
#
# The pgvector extension is installed by default in pgvector/pgvector images;
# the alembic migrations in each app enable it per-database.

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: shared
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "${POSTGRES_USER}" --dbname postgres <<-EOSQL
      SELECT 'CREATE DATABASE spendhound'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'spendhound')\gexec

      SELECT 'CREATE DATABASE jobhound'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'jobhound')\gexec

      -- Enable pgvector in each database
      \c spendhound
      CREATE EXTENSION IF NOT EXISTS vector;

      \c jobhound
      CREATE EXTENSION IF NOT EXISTS vector;
    EOSQL
    echo "Databases spendhound and jobhound are ready."
