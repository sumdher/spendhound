---
# Phase 2.2 — SpendHound Next.js frontend Deployment
#
# 2 replicas — safe because the frontend is stateless (NextAuth session is
# stored in a JWT in the browser cookie, not server-side).
#
# nodeAffinity: PREFERRED on worker nodes (kuma/zunesha) to keep zoro resources
# free for Postgres, Ollama, and the GPU.
#
# INTERNAL_API_URL is cluster-internal — never exposes the backend externally.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spendhound-frontend
  namespace: spendhound
  labels:
    app: spendhound-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spendhound-frontend
  template:
    metadata:
      labels:
        app: spendhound-frontend
    spec:
      affinity:
        nodeAffinity:
          # Prefer worker nodes; leave zoro for GPU/DB workloads
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: node-role
                    operator: In
                    values:
                      - worker
        # Spread the two replicas across different nodes
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: spendhound-frontend
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001

      containers:
        - name: frontend
          image: 192.168.1.37:5000/spendhound-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000
              name: http

          env:
            # Backend API URL — cluster-internal, never exposed externally
            - name: INTERNAL_API_URL
              value: "http://spendhound-backend.spendhound.svc.cluster.local:8000"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"

          # All frontend secrets from ESO → spendhound-frontend-secrets
          envFrom:
            - secretRef:
                name: spendhound-frontend-secrets

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 4
