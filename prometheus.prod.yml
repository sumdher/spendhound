global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: spendhound_backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000
    authorization:
      type: Bearer
      credentials_file: /tmp/metrics_token
