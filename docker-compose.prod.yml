# SpendHound - docker-compose.prod.yml
# Production-oriented Docker Compose configuration.

services:
  db:
    # Custom image: pgvector:pg16 + WAL-G binary (see postgres/Dockerfile).
    # The base image digest is pinned inside the Dockerfile FROM line.
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: spendhound_db_prod
    # Enable WAL archiving. archive_mode requires a server restart to toggle,
    # so it must be set here (not via ALTER SYSTEM). archive_timeout=60 caps
    # WAL data loss at ~60 seconds when the database is idle (no writes fill
    # a full 16 MB segment naturally).
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=wal-g wal-push %p
      - -c
      - archive_timeout=60
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spendhound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-spendhound}
      # WAL-G credentials - injected by infisical run.
      # archive_command inherits the Postgres process environment, so wal-g
      # picks these up automatically on each WAL segment upload.
      WALG_S3_PREFIX: ${WALG_S3_PREFIX}
      AWS_ENDPOINT: ${WALG_R2_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${WALG_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${WALG_SECRET_ACCESS_KEY}
      AWS_REGION: auto
      WALG_S3_USE_PATH_STYLE: "true"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spendhound} -d ${POSTGRES_DB:-spendhound}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  wal-g-backup:
    # Shares the same image as db (WAL-G + supercronic already installed).
    # Runs the daily base backup cron. WAL segment archiving is handled by
    # Postgres itself via archive_command - this sidecar only does base backups.
    # On FIRST DEPLOYMENT run a manual base backup before this schedule fires:
    #   docker exec spendhound_walg_backup_prod wal-g backup-push "$PGDATA"
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: spendhound_walg_backup_prod
    entrypoint: []
    command: [/usr/local/bin/supercronic, /etc/backup-cron]
    # Run as the postgres user (UID 999) so it can read the data directory.
    user: "999:999"
    environment:
      PGDATA: /var/lib/postgresql/data
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-spendhound}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-spendhound}
      WALG_S3_PREFIX: ${WALG_S3_PREFIX}
      AWS_ENDPOINT: ${WALG_R2_ENDPOINT}
      AWS_ACCESS_KEY_ID: ${WALG_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${WALG_SECRET_ACCESS_KEY}
      AWS_REGION: auto
      WALG_S3_USE_PATH_STYLE: "true"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/backup-cron:/etc/backup-cron:ro
    depends_on:
      db:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: spendhound_redis_prod
    # No host port — reachable only by containers on this network.
    # cap_drop omitted: redis:alpine entrypoint uses setpriv to drop from root to
    # the redis user at startup; CAP_SETUID/SETGID are required for that syscall.
    # Redis is internal-only (no exposed port, no external traffic), so capability
    # hardening here adds no meaningful protection.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3
    container_name: spendhound_pgbouncer_prod
    # Write userlist.txt at startup from env vars - same pattern as Prometheus
    # writing the metrics token to /run/metrics_token.
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf '"%s" "%s"\n' "$$POSTGRES_USER" "$$POSTGRES_PASSWORD" > /tmp/pgbouncer_userlist.txt
        exec pgbouncer /etc/pgbouncer/pgbouncer.ini
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spendhound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: spendhound_backend_prod
    env_file:
      - path: ./backend/.env    # non-secret config only — optional, all secrets via env block
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-spendhound}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-spendhound}?prepared_statement_cache_size=0
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Secrets — injected by `infisical run` via Makefile
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      LLM_KEY_ENCRYPTION_SECRET: ${LLM_KEY_ENCRYPTION_SECRET}
      MONTHLY_REPORTS_FRONTEND_TOKEN: ${MONTHLY_REPORTS_FRONTEND_TOKEN}
      MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER: ${MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER:-X-SpendHound-Internal-Token}
      METRICS_TOKEN: ${METRICS_TOKEN}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: spendhound-api
    volumes:
      - receipt_storage:/app/storage/receipts
    command:
      - sh
      - -c
      - |
        set -e
        alembic upgrade head
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1} --access-log --timeout-keep-alive 30
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: spendhound_celery_worker_prod
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-spendhound}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-spendhound}?prepared_statement_cache_size=0
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Secrets — injected by `infisical run` via Makefile
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      LLM_KEY_ENCRYPTION_SECRET: ${LLM_KEY_ENCRYPTION_SECRET}
      MONTHLY_REPORTS_FRONTEND_TOKEN: ${MONTHLY_REPORTS_FRONTEND_TOKEN}
      MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER: ${MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER:-X-SpendHound-Internal-Token}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_ENDPOINT: http://tempo:4318
      OTEL_SERVICE_NAME: spendhound-worker
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - receipt_storage:/app/storage/receipts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: spendhound_celery_beat_prod
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-spendhound}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB:-spendhound}?prepared_statement_cache_size=0
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      LLM_KEY_ENCRYPTION_SECRET: ${LLM_KEY_ENCRYPTION_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
    command: celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: spendhound_prometheus_prod
    # Write METRICS_TOKEN to a file at startup; prometheus.prod.yml reads it via
    # credentials_file so the secret is never hardcoded in the config file.
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf '%s' "$$METRICS_TOKEN" > /tmp/metrics_token
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.listen-address=0.0.0.0:9090
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN}
    ports:
      - "127.0.0.1:9090:9090"    # SSH tunnel: ssh -L 9090:localhost:9090 user@server
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.2.0
    container_name: spendhound_grafana_prod
    ports:
      - "127.0.0.1:3004:3000"    # SSH tunnel: ssh -L 3004:localhost:3004 user@server
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  tempo:
    image: grafana/tempo:2.6.0
    container_name: spendhound_tempo_prod
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  loki:
    image: grafana/loki:3.1.0
    container_name: spendhound_loki_prod
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:3.1.0
    container_name: spendhound_promtail_prod
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/var/promtail
    depends_on:
      - loki
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: spendhound_alertmanager_prod
    # Write SLACK_WEBHOOK_URL to a file; alertmanager.yml reads it via api_url_file.
    # Same pattern as Prometheus reading the metrics token from /run/metrics_token.
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf '%s' "$$SLACK_WEBHOOK_URL" > /tmp/slack_webhook_url
        exec /bin/alertmanager \
          --config.file=/etc/alertmanager/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.listen-address=0.0.0.0:9093
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    ports:
      - "127.0.0.1:9095:9093"    # SSH tunnel: ssh -L 9095:localhost:9095 user@server
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    depends_on:
      - prometheus
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: spendhound_frontend_prod
    environment:
      INTERNAL_API_URL: http://backend:8000
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Secrets — injected by `infisical run` via Makefile
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MONTHLY_REPORTS_FRONTEND_TOKEN: ${MONTHLY_REPORTS_FRONTEND_TOKEN}
      MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER: ${MONTHLY_REPORTS_FRONTEND_TOKEN_HEADER:-X-SpendHound-Internal-Token}
      MONTHLY_REPORTS_BACKEND_JWT_SECRET: ${MONTHLY_REPORTS_BACKEND_JWT_SECRET}
      MONTHLY_REPORTS_BACKEND_JWT_ALGORITHM: ${MONTHLY_REPORTS_BACKEND_JWT_ALGORITHM:-HS256}
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH:-/usr/bin/chromium-browser}
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3002}:3000"
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  cloudflared:
    # Pin by digest so a tag re-push cannot silently swap the image.
    # To update: docker pull cloudflare/cloudflared:2024.11.0 && docker inspect --format='{{index .RepoDigests 0}}' cloudflare/cloudflared:2024.11.0
    image: cloudflare/cloudflared@sha256:2c78df02e1f23ab19d4c636921f05b9ebec163b887e946f98e22e56254a5540f
    container_name: spendhound_cloudflared_prod
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      frontend:
        condition: service_healthy
    volumes:
      - ${CLOUDFLARED_CONFIG_PATH:-./deploy/cloudflared/config.yml}:/etc/cloudflared/config.yml:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  postgres_data:
  receipt_storage:
  prometheus_data:
  alertmanager_data:
  loki_data:
  promtail_positions:
  tempo_data:
  grafana_data:
